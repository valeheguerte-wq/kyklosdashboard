<style>/* Kyklos brand palette + DM Sans */
:root {
  /* Brand */
  --teal:        #3D8B7A;
  --teal-dark:   #2C5F55;
  --teal-soft:   #B8D8D2;
  --teal-bg:     #E8F0EE;
  --green:       #6AAF6B;
  --green-soft:  #D9EBD3;
  --yellow:      #E8C46A;
  --yellow-soft: #FBEFCE;
  --orange:      #E8854A;
  --orange-deep: #C56833;
  --orange-soft: #FFEADB;
  --orange-bg:   #FFF4EC;

  /* Archetype-specific (logo-derived) */
  --arc-gamer:     #E8C46A;
  --arc-home:      #6AAF6B;
  --arc-nomada:    #3D8B7A;
  --arc-gig:       #E8854A;
  --arc-student:   #5A9E8F;
  --arc-hogar:     #A8C5A0;
  --arc-other:     #D0CBC4;

  /* Cohort (antigüedad) */
  --cohort-new:    #6AAF6B;
  --cohort-mid:    #E8854A;
  --cohort-old:    #3D8B7A;

  /* Text & surfaces */
  --ink:           #5A5450;
  --ink-strong:    #3A3631;
  --ink-soft:      #6B6560;
  --ink-faint:     #8B847E;
  --bg:            #FAFAF8;
  --bg-alt:        #F2F0ED;
  --surface:       #FFFFFF;
  --border:        #E5E1DC;
  --border-strong: #D4CFC8;

  /* Sidebar */
  --side:          #2C5F55;
  --side-active:   #3D8B7A;
  --side-hover:    #34685C;
  --side-text:     #F4F2EC;
  --side-text-d:   #A8C2BC;

  /* Semantic */
  --ok:            #4A8B5C;
  --warn:          #C28A2A;
  --risk:          #C56833;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

/* ──────── Layout ──────── */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}

/* ──────── Sidebar ──────── */
.side {
  background: var(--side);
  color: var(--side-text);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}
.side__brand {
  padding: 22px 22px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.side__brand-row {
  display: flex;
  align-items: center;
  gap: 11px;
}
.side__logo {
  width: 30px; height: 30px;
  flex-shrink: 0;
}
.side__wordmark {
  font-size: 17px;
  font-weight: 500;
  color: #FFFFFF;
  letter-spacing: 3px;
}
.side__meta {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.side__chip {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  background: rgba(184,216,210,0.15);
  border: 1px solid rgba(184,216,210,0.3);
  color: var(--teal-soft);
}
.side__ver { font-size: 10px; color: var(--side-text-d); }

.side__nav {
  flex: 1;
  padding: 14px 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.side__group-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--side-text-d);
  padding: 14px 14px 6px;
  opacity: 0.7;
}
.side__item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 12px 9px 13px;
  border-left: 3px solid transparent;
  margin-left: -10px;
  padding-left: 13px;
  background: transparent;
  color: #D6E6E1;
  border: none;
  border-radius: 0 6px 6px 0;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: all 100ms ease;
}
.side__item:hover { background: var(--side-hover); color: #FFFFFF; }
.side__item.is-active {
  background: var(--side-active);
  color: #FFFFFF;
  border-left-color: var(--orange);
  font-weight: 600;
}
.side__item-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0.85;
}
.side__item.is-active .side__item-icon { opacity: 1; }

.side__footer {
  padding: 12px 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.side__sync {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 11px;
  border-radius: 6px;
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.06);
}
.side__sync-text { flex: 1; min-width: 0; }
.side__sync-title { font-size: 11px; font-weight: 600; color: #FFFFFF; }
.side__sync-sub { font-size: 10px; color: var(--side-text-d); }
.side__user {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 2px;
}
.side__avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--orange);
  color: #FFFFFF;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.side__user-name { font-size: 12px; font-weight: 600; color: #FFFFFF; }
.side__user-role { font-size: 10px; color: var(--side-text-d); }

/* ──────── Main ──────── */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-width: 0;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 36px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar__kicker {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.topbar__sub { font-size: 13px; color: var(--ink); margin-top: 3px; font-weight: 500; }
.topbar__right { display: flex; align-items: center; gap: 18px; }
.topbar__time { text-align: right; }
.topbar__time-l { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.3px; }
.topbar__time-v { font-size: 12px; font-weight: 600; color: var(--ink-strong); font-variant-numeric: tabular-nums; margin-top: 2px; white-space: nowrap; }

.content {
  flex: 1;
  padding: 28px 36px 60px;
  overflow-y: auto;
  overflow-x: hidden;
}

/* ──────── Common UI ──────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.card.is-hover:hover {
  border-color: var(--border-strong);
  box-shadow: 0 1px 0 rgba(58,54,49,0.03), 0 8px 24px -16px rgba(58,54,49,0.15);
}
.card.is-padless { padding: 0; }
.card.is-topbar { border-top-width: 3px; border-top-style: solid; border-radius: 0 0 10px 10px; }

.sec {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 16px;
}
.sec__title-wrap {}
.sec__kicker {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.sec__title {
  font-size: 18px;
  font-weight: 600;
  color: var(--ink-strong);
  letter-spacing: -0.2px;
  text-wrap: balance;
}
.sec__right { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 10px; }

.label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.row { display: flex; align-items: center; }
.gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-10 { gap: 10px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-4 { margin-top: 4px; } .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.flex-wrap { flex-wrap: wrap; }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 9px;
  font-size: 11px;
  font-weight: 600;
  line-height: 1.5;
  letter-spacing: 0.2px;
  border-radius: 4px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.badge--ok      { background: var(--green-soft);  color: #2E6E3F; border-color: #B7D8B3; }
.badge--warn    { background: var(--yellow-soft); color: #8F6611; border-color: #EBD79A; }
.badge--risk    { background: var(--orange-soft); color: #9A4C18; border-color: #F4C19A; }
.badge--teal    { background: var(--teal-bg);     color: #2A6B5D; border-color: #B8D8D2; }
.badge--neutral { background: var(--bg-alt);      color: var(--ink); border-color: var(--border); }

/* Risk dot bar */
.risk-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 130px;
}
.risk-bar__track {
  flex: 1;
  height: 6px;
  background: var(--bg-alt);
  border-radius: 3px;
  overflow: hidden;
}
.risk-bar__fill { height: 100%; border-radius: 3px; }
.risk-bar__num { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13px; min-width: 28px; text-align: right; }

/* Capsule button */
.btn-cap {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--orange);
  color: #FFFFFF;
  border: none;
  border-radius: 999px;
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1px;
  line-height: 1.2;
  transition: background 120ms ease;
  white-space: nowrap;
}
.btn-cap:hover { background: var(--orange-deep); }
.btn-cap--green { background: var(--green); }
.btn-cap--green:hover { background: #56965A; }
.btn-cap--teal { background: var(--teal); }
.btn-cap--teal:hover { background: var(--teal-dark); }
.btn-cap--md { padding: 10px 22px; font-size: 13px; }

/* Secondary button */
.btn-sec {
  background: transparent;
  color: var(--teal);
  border: 1px solid var(--teal);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  line-height: 1.2;
  transition: all 120ms ease;
}
.btn-sec:hover { background: var(--teal-bg); }

/* Pulse dot */
.pulse {
  position: relative;
  display: inline-block;
  width: 8px; height: 8px;
}
.pulse::before, .pulse::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
}
.pulse::before { background: var(--green); opacity: 0.5; animation: kyk-pulse 1.8s ease-out infinite; }
.pulse::after  { background: var(--green); }
.pulse--warn::before { background: var(--yellow); }
.pulse--warn::after  { background: var(--yellow); }
.pulse--lg { width: 10px; height: 10px; }
.pulse--sm { width: 6px; height: 6px; }
@keyframes kyk-pulse {
  0%   { transform: scale(1); opacity: 0.55; }
  70%  { transform: scale(2.6); opacity: 0; }
  100% { transform: scale(2.6); opacity: 0; }
}

/* KPI card */
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--orange);
  border-radius: 0 0 10px 10px;
  padding: 18px 20px 20px;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.kpi:hover { box-shadow: 0 1px 0 rgba(58,54,49,0.03), 0 8px 24px -16px rgba(58,54,49,0.15); }
.kpi__label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); }
.kpi__value {
  display: flex; align-items: baseline; gap: 6px; margin-top: 12px;
}
.kpi__num {
  font-size: 32px; font-weight: 600; color: var(--ink-strong);
  letter-spacing: -0.6px; font-variant-numeric: tabular-nums; line-height: 1;
}
.kpi__unit { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
.kpi__delta {
  display: flex; align-items: center; gap: 8px; margin-top: 12px;
}
.kpi__delta-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
}
.kpi__delta-pill--good { color: #2E6E3F; background: var(--green-soft); }
.kpi__delta-pill--bad  { color: #9A4C18; background: var(--orange-soft); }
.kpi__delta-sub { font-size: 12px; color: var(--ink-soft); }
.kpi__foot {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--ink-soft); letter-spacing: 0.2px;
}

/* Tables */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
.tbl thead tr { border-bottom: 1px solid var(--border); background: var(--bg-alt); }
.tbl th {
  font-size: 10px; font-weight: 600; color: var(--ink-soft);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 13px 16px; text-align: left;
}
.tbl th.right { text-align: right; }
.tbl tbody tr { border-bottom: 1px solid var(--border); transition: background 100ms ease; }
.tbl tbody tr:last-child { border-bottom: none; }
.tbl tbody tr:hover { background: var(--bg-alt); }
.tbl td {
  font-size: 13px; color: var(--ink); padding: 14px 16px;
  vertical-align: middle;
}
.tbl td.right { text-align: right; }
.tbl td.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; font-weight: 600; color: var(--teal-dark); }
.tbl .num { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink-strong); }

/* Note footer */
.note {
  font-size: 11px; color: var(--ink-soft); font-style: italic;
  display: flex; align-items: center; gap: 8px;
}

/* Footnote on inferred */
.inferred-foot {
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
  font-size: 10px; color: var(--ink-soft); font-style: italic;
}

/* View visibility */
.view { display: none; flex-direction: column; gap: 28px; }
.view.is-active { display: flex; }

/* Grid helpers */
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-2-1 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3-2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

/* Archetype card */
.arc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 4px solid var(--teal);
  border-radius: 0 0 10px 10px;
  padding: 20px 22px;
  transition: box-shadow 120ms ease;
}
.arc:hover { box-shadow: 0 1px 0 rgba(58,54,49,0.03), 0 8px 24px -16px rgba(58,54,49,0.15); }
.arc__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.arc__emoji { font-size: 26px; line-height: 1; }
.arc__name { font-size: 17px; font-weight: 600; color: var(--ink-strong); margin-top: 10px; letter-spacing: -0.2px; }
.arc__stats { display: flex; align-items: baseline; gap: 14px; margin-top: 8px; color: var(--ink-soft); font-size: 12px; }
.arc__pct { font-size: 22px; font-weight: 600; color: var(--ink-strong); font-variant-numeric: tabular-nums; letter-spacing: -0.4px; }
.arc__cnt { font-variant-numeric: tabular-nums; }
.arc__features { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.arc__feature { font-size: 12px; color: var(--ink); display: flex; gap: 8px; line-height: 1.45; }
.arc__feature::before { content: '·'; color: var(--ink-faint); font-weight: 700; }

/* Mini counter */
.mini {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
}
.mini__l { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); }
.mini__v {
  font-size: 26px; font-weight: 600; color: var(--ink-strong);
  letter-spacing: -0.5px; font-variant-numeric: tabular-nums; margin-top: 6px; line-height: 1;
}

/* Channel chip */
.chip {
  font-size: 11px; font-weight: 600; color: var(--ink);
  padding: 4px 10px; border-radius: 999px;
  background: var(--bg-alt); border: 1px solid var(--border);
}

/* Offer card */
.offer__head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
.offer__name { font-size: 16px; font-weight: 600; color: var(--ink-strong); letter-spacing: -0.2px; line-height: 1.3; }
.offer__seg { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
.offer__conv {
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border);
}
.offer__conv-num {
  font-size: 32px; font-weight: 600; color: var(--teal);
  letter-spacing: -0.5px; font-variant-numeric: tabular-nums; line-height: 1;
}
.offer__conv-unit { font-size: 16px; font-weight: 600; color: var(--teal); }
.offer__channels { margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap; }

/* Pie chart legend */
.legend { display: flex; flex-direction: column; gap: 10px; }
.legend__row {
  display: grid; grid-template-columns: 14px 1fr auto auto;
  align-items: center; gap: 10px;
  font-size: 13px;
}
.legend__sw { width: 10px; height: 10px; border-radius: 2px; }
.legend__name { color: var(--ink); }
.legend__val { font-variant-numeric: tabular-nums; color: var(--ink-strong); font-weight: 600; font-size: 12px; }
.legend__cnt { font-variant-numeric: tabular-nums; color: var(--ink-soft); font-size: 11px; }

/* Cohort card */
.cohort {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--cohort-old);
  border-radius: 0 0 10px 10px;
  padding: 20px 22px;
}
.cohort__head { display: flex; justify-content: space-between; align-items: flex-start; }
.cohort__label { font-size: 18px; font-weight: 600; color: var(--ink-strong); }
.cohort__range { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.cohort__cnt {
  font-size: 28px; font-weight: 600; color: var(--ink-strong);
  letter-spacing: -0.5px; font-variant-numeric: tabular-nums; line-height: 1; margin-top: 14px;
}
.cohort__cnt-l { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); margin-top: 4px; }
.cohort__split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.cohort__s-l { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); }
.cohort__s-v { font-size: 16px; font-weight: 600; color: var(--ink-strong); font-variant-numeric: tabular-nums; margin-top: 4px; }

/* Pipeline row */
.pipe {
  display: grid;
  grid-template-columns: 32px 1fr 220px 130px;
  align-items: center; gap: 16px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  transition: background 100ms ease;
}
.pipe:last-child { border-bottom: none; }
.pipe:hover { background: var(--bg-alt); }
.pipe__name { font-size: 14px; font-weight: 600; color: var(--ink-strong); }
.pipe__desc { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.pipe__metric { font-size: 13px; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
.pipe__metric.warn { color: var(--warn); font-weight: 600; }
.pipe__ts { font-size: 12px; color: var(--ink-soft); text-align: right; font-variant-numeric: tabular-nums; }

/* Profile */
.client-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 5px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all 120ms ease;
}
.client-chip:hover { border-color: var(--border-strong); }
.client-chip.is-active { background: var(--teal); border-color: var(--teal); color: #FFFFFF; }
.client-chip__av {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-alt); color: var(--teal-dark);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
}
.client-chip.is-active .client-chip__av { background: rgba(255,255,255,0.18); color: #FFFFFF; }
.client-chip__id { font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.8; }

.search {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  transition: border-color 120ms ease, background 120ms ease;
}
.search:focus-within { border-color: var(--teal); background: var(--surface); }
.search input {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: 14px; color: var(--ink-strong);
}
.search input::placeholder { color: var(--ink-faint); }

.profile-header { padding: 24px; }
.profile-header__grid {
  display: grid; grid-template-columns: auto 1fr auto auto;
  gap: 24px; align-items: center;
}
.profile-header__avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--teal);
  color: #FFFFFF;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 600;
}
.profile-header__name { font-size: 22px; font-weight: 600; color: var(--ink-strong); letter-spacing: -0.3px; }
.profile-header__id { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.5px; }
.profile-header__cohort { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.profile-header__col {
  text-align: right; padding-right: 24px; border-right: 1px solid var(--border);
}
.profile-header__col:last-child { padding-right: 0; border-right: none; }
.profile-header__col-l { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); }
.profile-header__col-v { font-size: 26px; font-weight: 600; letter-spacing: -0.4px; font-variant-numeric: tabular-nums; margin-top: 4px; color: var(--ink-strong); }
.profile-header__col-sub { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

.pblock { padding: 20px; }
.pblock__l { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.pblock__dot { width: 6px; height: 6px; border-radius: 50%; }
.pblock__row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; font-size: 13px; align-items: flex-start; padding: 5px 0; }
.pblock__k { color: var(--ink-soft); font-size: 12px; }
.pblock__v { color: var(--ink-strong); font-weight: 500; }

.signal-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 8px 0;
}
.signal-row + .signal-row { border-top: 1px dashed var(--border); }
.signal-icon {
  width: 18px; height: 18px; border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.signal-icon.is-active { background: var(--orange-soft); color: var(--orange-deep); }
.signal-icon.is-off    { background: var(--bg-alt);     color: var(--ink-faint); }
.signal-text { font-size: 12px; line-height: 1.4; min-width: 0; }
.signal-text.is-active { color: var(--ink-strong); font-weight: 600; }
.signal-text.is-off    { color: var(--ink-soft); }
.signal-detail { font-size: 11px; font-weight: 400; color: var(--ink); margin-top: 2px; }
.signal-yn { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; }
.signal-yn.is-active { color: var(--orange-deep); }
.signal-yn.is-off    { color: var(--ink-faint); }

.rec {
  background: linear-gradient(90deg, var(--orange-bg) 0%, #FFFAF5 100%);
  border: 1px solid #F4C19A;
  border-left: 4px solid var(--orange);
  border-radius: 10px;
  padding: 22px 24px;
  display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center;
}
.rec__l { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--orange-deep); margin-bottom: 8px; }
.rec__title { font-size: 22px; font-weight: 600; color: var(--ink-strong); letter-spacing: -0.3px; line-height: 1.25; }
.rec__reason { font-size: 13px; color: var(--ink); margin-top: 6px; line-height: 1.5; max-width: 760px; }

/* Strategy decision tree */
.dtree {
  background: var(--surface); border: 1px solid var(--border);
  border-top: 4px solid var(--orange);
  border-radius: 0 0 10px 10px;
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;
}
.dtree__head { display: flex; align-items: center; gap: 12px; }
.dtree__emoji { font-size: 22px; }
.dtree__name { font-size: 16px; font-weight: 600; color: var(--ink-strong); }
.dtree__step {
  background: var(--bg-alt); border-radius: 6px;
  padding: 10px 12px; font-size: 12px; line-height: 1.45;
  border-left: 3px solid var(--teal);
}
.dtree__step-k { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--teal-dark); margin-bottom: 4px; }
.dtree__step--if   { border-left-color: var(--teal); }
.dtree__step--then { border-left-color: var(--orange); }
.dtree__step--then .dtree__step-k { color: var(--orange-deep); }
.dtree__step--else { border-left-color: var(--ink-faint); }
.dtree__step--else .dtree__step-k { color: var(--ink-soft); }
.dtree__note { font-size: 11px; color: var(--ink-soft); font-style: italic; margin-top: 4px; }

/* Strategy banner */
.banner {
  background: var(--teal-bg);
  border: 1px solid var(--teal-soft);
  border-left: 4px solid var(--teal);
  border-radius: 8px;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
}
.banner__icon { font-size: 22px; }
.banner__text { font-size: 13px; color: var(--ink-strong); line-height: 1.5; }
.banner__text strong { color: var(--teal-dark); }

/* Value segment bar */
.vseg {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 18px;
}
.vseg__l { font-size: 12px; font-weight: 600; color: var(--ink-strong); }
.vseg__sub { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.vseg__bar { margin-top: 12px; height: 10px; background: var(--bg-alt); border-radius: 5px; overflow: hidden; }
.vseg__fill { height: 100%; border-radius: 5px; }
.vseg__cnt { display: flex; align-items: baseline; gap: 6px; margin-top: 8px; }
.vseg__num { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink-strong); }
.vseg__unit { font-size: 11px; color: var(--ink-soft); }

/* Donut + lists */
.donut-wrap { display: flex; align-items: center; gap: 24px; }
.donut-mid {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.donut-mid__v { font-size: 28px; font-weight: 600; color: var(--teal-dark); letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.donut-mid__l { font-size: 9px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-soft); margin-top: 2px; }

/* Source status list (small) */
.slist { display: flex; flex-direction: column; gap: 8px; }
.slist__row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 6px;
  background: var(--bg-alt);
}
.slist__name { flex: 1; font-size: 12px; color: var(--ink-strong); font-weight: 500; }
.slist__metric { font-size: 11px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: #B7B0A8; }
::selection { background: var(--teal-soft); color: var(--teal-dark); }

/* ──────── Expandable chart cards + modal ──────── */
.is-expandable {
  position: relative;
  cursor: zoom-in;
  transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
}
.is-expandable:hover {
  border-color: var(--teal-soft);
  box-shadow: 0 1px 0 rgba(58,54,49,0.03), 0 12px 32px -18px rgba(58,54,49,0.25);
}
.expand-btn {
  position: absolute;
  top: 14px; right: 14px;
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: all 120ms ease;
  z-index: 2;
}
.is-expandable:hover .expand-btn {
  opacity: 1;
  background: var(--surface);
  border-color: var(--teal-soft);
  color: var(--teal-dark);
}
.hint {
  font-size: 11px; color: var(--ink-soft); font-style: italic;
}

.chart-modal {
  position: fixed; inset: 0; z-index: 100;
  opacity: 0;
  transition: opacity 180ms ease;
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
}
.chart-modal.is-open { opacity: 1; }
.chart-modal__backdrop {
  position: absolute; inset: 0;
  background: rgba(44, 54, 49, 0.5);
  backdrop-filter: blur(4px);
  cursor: zoom-out;
}
.chart-modal__panel {
  position: relative;
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  max-width: 1080px;
  width: 100%;
  max-height: 88vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 64px -20px rgba(44,54,49,0.4), 0 8px 24px -12px rgba(44,54,49,0.2);
  transform: scale(0.97) translateY(8px);
  transition: transform 200ms cubic-bezier(0.2, 0.9, 0.3, 1.2);
}
.chart-modal.is-open .chart-modal__panel { transform: scale(1) translateY(0); }
.chart-modal__close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 3;
  transition: all 120ms ease;
}
.chart-modal__close:hover { background: var(--surface); color: var(--ink-strong); }
.chart-modal__body {
  padding: 36px 42px;
  overflow-y: auto;
}
.exp__kicker {
  font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--teal-dark);
}
.exp__title {
  font-size: 26px; font-weight: 600; color: var(--ink-strong);
  letter-spacing: -0.4px; margin-top: 6px; line-height: 1.2;
}
.exp__sub {
  font-size: 13px; color: var(--ink-soft); margin-top: 6px;
}
.exp__list {
  display: flex; flex-direction: column;
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.exp-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.exp-row:last-child { border-bottom: none; }
.exp-row:nth-child(even) { background: var(--bg-alt); }

/* ──────── Live pill (churn header) ──────── */
.live-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--orange-bg), #FFFFFF);
  border: 1px solid #F4C19A;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px;
  color: var(--orange-deep);
  text-transform: uppercase;
}
.live-pill .pulse::before, .live-pill .pulse::after { background: var(--orange); }
.live-pill__sep { color: var(--ink-faint); }
.live-pill__t {
  font-weight: 500; letter-spacing: 0.2px;
  color: var(--ink-strong);
  text-transform: none;
  font-variant-numeric: tabular-nums;
  transition: color 200ms ease;
}
.live-pill__t.is-pulse {
  color: var(--orange-deep);
  font-weight: 700;
}

/* ──────── Definition tooltip (ROI) ──────── */
.definition {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
}
.definition__k {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--teal-dark);
  padding: 2px 6px;
  background: var(--teal-bg);
  border-radius: 3px;
}
.definition__v { font-size: 11px; color: var(--ink-soft); font-style: italic; }

.info-i {
  display: inline-flex; align-items: center; justify-content: center;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--ink-faint);
  color: #FFFFFF;
  font-size: 8px; font-weight: 700;
  font-style: normal;
  text-transform: none;
  letter-spacing: 0;
  margin-left: 4px;
  vertical-align: 1px;
  cursor: help;
}

/* ──────── Offer card (enhanced) ──────── */
.offer { padding: 22px; display: flex; flex-direction: column; gap: 0; }
.offer__metrics {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 18px; padding-top: 16px;
  border-top: 1px solid var(--border);
}
.offer__metric { min-width: 0; }
.offer__metric-l {
  font-size: 9px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--ink-soft);
}
.offer__metric-v {
  font-size: 15px; font-weight: 600; color: var(--ink-strong);
  font-variant-numeric: tabular-nums;
  margin-top: 4px;
  letter-spacing: -0.2px;
}
.offer__metric-v--ab { color: var(--teal-dark); }
.offer__metric-u { font-size: 10px; font-weight: 500; color: var(--ink-soft); }
.offer__metric-s {
  font-size: 10px; color: var(--ink-soft); margin-top: 2px;
}
.offer__budget {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.offer__budget-bar {
  margin-top: 8px;
  height: 6px; background: var(--bg-alt);
  border-radius: 3px; overflow: hidden;
}
.offer__budget-fill { height: 100%; border-radius: 3px; transition: width 300ms ease; }
.offer__foot {
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ──────── Architecture diagram ──────── */
.arch {
  display: grid;
  grid-template-columns: 1fr 28px 1fr 28px 1fr 28px 1fr;
  gap: 0;
  align-items: stretch;
}
.arch-arrow {
  display: flex; align-items: center; justify-content: center;
  color: var(--border-strong);
  font-size: 22px;
  font-weight: 300;
}
.arch-layer {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.arch-layer__head { display: flex; align-items: center; gap: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.arch-layer__dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.arch-layer__title { font-size: 13px; font-weight: 600; color: var(--ink-strong); letter-spacing: -0.1px; }
.arch-layer__kicker { font-size: 10px; font-weight: 500; color: var(--ink-soft); margin-top: 1px; }
.arch-layer__items { display: flex; flex-direction: column; gap: 8px; }
.arch-node {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  border-radius: 6px;
  padding: 9px 11px;
  position: relative;
}
.arch-node__t { font-size: 12px; font-weight: 600; color: var(--ink-strong); }
.arch-node__d { font-size: 10.5px; color: var(--ink-soft); margin-top: 2px; line-height: 1.4; }
.arch-node__tag {
  display: inline-block; margin-top: 6px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.4px;
  padding: 1px 6px; border-radius: 3px;
  border: 1px solid var(--border);
  font-family: ui-monospace, monospace;
}

.arch-cross {
  margin-top: 16px;
  padding: 14px 16px;
  background: linear-gradient(180deg, #FFFFFF, var(--bg-alt));
  border: 1px dashed var(--border-strong);
  border-radius: 8px;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.arch-cross__l {
  font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--ink-soft);
}
.arch-cross__items { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
.arch-cross__chip {
  font-size: 11px; font-weight: 500; color: var(--ink);
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
}
</style>
</head>
<body>
  
  <div id="app"></div>
  <script>

  <script>
// SVG and small UI helpers — wrapped in IIFE to keep top-level scope clean
(function() {

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const ARC = window.KYK.ARCHETYPES;
const RISK_INFO = window.KYK.RISK_INFO;
const COHORT_INFO = window.KYK.COHORT_INFO;

function badge(text, tone = 'neutral') {
  return `<span class="badge badge--${tone}">${esc(text)}</span>`;
}

function riskBadge(level) {
  const r = RISK_INFO[level];
  return badge(r.label, r.tone);
}

function cohortBadge(id) {
  const c = COHORT_INFO[id];
  const tone = c.tone;
  return `<span class="badge badge--${tone}">${c.label}</span>`;
}

function archetypeBadge(id) {
  const a = ARC[id];
  return `<span class="badge" style="background:${a.color}22;color:${shadeFor(a.color)};border-color:${a.color}66;">${a.emoji} ${a.name}</span>`;
}

function shadeFor(hex) {
  // darker version for text on light tint
  const map = {
    '#3D8B7A': '#2A6B5D', '#6AAF6B': '#3F7A47',
    '#E8C46A': '#8F6A12', '#E8854A': '#9A4C18',
    '#5A9E8F': '#3D7C6F', '#A8C5A0': '#5F8859',
    '#D0CBC4': '#6B6560',
  };
  return map[hex] || '#3A3631';
}

// Donut SVG (single value 0-100)
function donutSvg(pct, size = 140, stroke = 18, color = '#3D8B7A') {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - pct / 100);
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg);">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EEEAE4" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    </svg>`;
}

// Pie chart SVG with multiple slices
function pieSvg(slices, size = 200) {
  const r = size / 2 - 2;
  const cx = size / 2, cy = size / 2;
  const total = slices.reduce((s, d) => s + d.pct, 0);
  let acc = 0;
  const paths = slices.map(s => {
    const start = (acc / total) * Math.PI * 2 - Math.PI / 2;
    acc += s.pct;
    const end = (acc / total) * Math.PI * 2 - Math.PI / 2;
    const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(end),   y2 = cy + r * Math.sin(end);
    const large = end - start > Math.PI ? 1 : 0;
    const aid = s.id || '';
    return `<path data-aid="${aid}" d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${s.color}" stroke="#FFFFFF" stroke-width="1.5" style="transition:transform 0.25s cubic-bezier(.34,1.56,.64,1),opacity 0.2s ease;transform-box:fill-box;transform-origin:center;"/>`;
  }).join('');
  // Inner hole for donut feel
  return `<svg id="kyk-pie-svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${r * 0.48}" fill="#FFFFFF"/></svg>`;
}

// Bar chart SVG — vertical, used by churn trend on Home
function trendSvg(data, opts = {}) {
  const W = 520, H = 220;
  const pad = { t: 24, r: 20, b: 36, l: 40 };
  const min = opts.min ?? 3, max = opts.max ?? 6;
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const gap = innerW / data.length;
  const bw = gap * 0.62;
  const gridY = [];
  for (let v = min; v <= max; v++) {
    const y = pad.t + innerH * (1 - (v - min) / (max - min));
    gridY.push(`<line x1="${pad.l}" x2="${W - pad.r}" y1="${y}" y2="${y}" stroke="#E5E1DC" stroke-dasharray="2 4"/>
      <text x="${pad.l - 8}" y="${y + 4}" font-size="10" fill="#6B6560" text-anchor="end" font-weight="500">${v}%</text>`);
  }
  const bars = data.map((d, i) => {
    const cx = pad.l + gap * i + gap / 2;
    const x = cx - bw / 2;
    const h = innerH * (d.v - min) / (max - min);
    const y = pad.t + innerH - h;
    const isCurrent = d.current;
    return `
      <rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${isCurrent ? '#3D8B7A' : '#B8D8D2'}" rx="3"/>
      <text x="${cx}" y="${y - 6}" font-size="11" font-weight="600"
        fill="${isCurrent ? '#2A6B5D' : '#6B6560'}" text-anchor="middle">${d.v.toFixed(1)}</text>
      <text x="${cx}" y="${H - pad.b + 16}" font-size="11"
        fill="${isCurrent ? '#3A3631' : '#6B6560'}"
        font-weight="${isCurrent ? 600 : 500}" text-anchor="middle">${d.m}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">${gridY.join('')}${bars}</svg>`;
}

// Horizontal bar chart for ARPU by archetype
function hBarSvg(rows, opts = {}) {
  const W = 540, rowH = 38, labelW = 130, valueW = 70;
  const pad = { t: 8, r: 10, b: 8, l: labelW };
  const H = pad.t + rowH * rows.length + pad.b;
  const barAreaW = W - pad.l - valueW - pad.r;
  const max = Math.max(...rows.map(r => r.value));
  const bars = rows.map((r, i) => {
    const y = pad.t + i * rowH;
    const w = (r.value / max) * barAreaW;
    return `
      <text x="${pad.l - 10}" y="${y + rowH/2 + 4}" font-size="12" fill="#3A3631" text-anchor="end" font-weight="500">${esc(r.label)}</text>
      <rect x="${pad.l}" y="${y + rowH/2 - 9}" width="${barAreaW}" height="18" fill="#F2F0ED" rx="3"/>
      <rect x="${pad.l}" y="${y + rowH/2 - 9}" width="${w}" height="18" fill="${r.color}" rx="3"/>
      <text x="${pad.l + barAreaW + 8}" y="${y + rowH/2 + 4}" font-size="12" fill="#3A3631" font-weight="600" font-variant-numeric="tabular-nums">${esc(r.valueLabel || r.value)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">${bars}</svg>`;
}

// Risk-score bar (inline) used in churn table cells
function riskRateBar(rate) {
  const color = rate >= 5 ? '#E8854A' : rate >= 3 ? '#E8C46A' : '#6AAF6B';
  const pct = Math.min(100, (rate / 8) * 100);

    <div class="risk-bar">

      </div>
      <div class="risk-bar__num" style="color:${color};">${rate.toFixed(1)}%</div>
    </div>`;
}

window.KYKUI = { esc, badge, riskBadge, cohortBadge, archetypeBadge, shadeFor, donutSvg, pieSvg, trendSvg, hBarSvg, riskRateBar };

// ─── VISTA 7: OFERTAS ACTIVAS ────────────────────────────
function renderOfertas() {
  const statusMap = {
    activa:  { tone: 'ok',      label: 'Activa' },
    prueba:  { tone: 'warn',    label: 'En prueba' },
    pausada: { tone: 'neutral', label: 'Pausada' },
  };
  const counts = {
    activa: OFFERS.filter(o => o.status === 'activa').length,
    prueba: OFFERS.filter(o => o.status === 'prueba').length,
    pausada: OFFERS.filter(o => o.status === 'pausada').length,
  };
  const cards = OFFERS.map(o => {
    const meta = ARC[o.id];
    const st = statusMap[o.status];
    const vsGoal = ((o.conv - o.goal) / o.goal) * 100;
    const goalTone = vsGoal >= 0 ? 'good' : 'bad';
    const goalSign = vsGoal >= 0 ? '+' : '';
    const budgetPct = (o.budget.used / o.budget.total) * 100;
    const budgetColor = budgetPct > 85 ? '#E8854A' : budgetPct > 60 ? '#E8C46A' : '#6AAF6B';
    return `
      <div class="card is-hover offer">
        <div class="offer__head">
          <span class="badge" style="background:${meta.color}22;color:${U.shadeFor(meta.color)};border-color:${meta.color}66;">${meta.emoji} ${meta.name}</span>
          <div class="row gap-6">
            <span class="badge badge--neutral" title="Días en curso">${o.days}d</span>
            <span class="badge badge--${st.tone}">● ${st.label}</span>
          </div>
        </div>
        <div class="offer__name">${U.esc(o.name)}</div>
        <div class="offer__seg">Conversión actual vs meta ${o.goal.toFixed(0)}%</div>
        <div class="offer__conv">
          <span class="offer__conv-num">${o.conv.toFixed(1)}</span>
          <span class="offer__conv-unit">%</span>
          <span class="kpi__delta-pill kpi__delta-pill--${goalTone}" style="margin-left:10px;font-size:11px;">${goalSign}${vsGoal.toFixed(1)} pts</span>
        </div>

        <div class="offer__metrics">
          <div class="offer__metric">
            <div class="offer__metric-l">Audiencia</div>
            <div class="offer__metric-v">${U.esc(o.audience)}</div>
            <div class="offer__metric-s">Alcance: ${U.esc(o.reached)}</div>
          </div>
          <div class="offer__metric">
            <div class="offer__metric-l">CPA</div>
            <div class="offer__metric-v">$${o.cpa}<span class="offer__metric-u"> MXN</span></div>
            <div class="offer__metric-s">LTV lift ${o.ltvLift}</div>
          </div>
          <div class="offer__metric">
            <div class="offer__metric-l">ROI campaña</div>
            <div class="offer__metric-v offer__metric-v--ab">${o.roi}</div>
            <div class="offer__metric-s">vs. costo de adquisición</div>
          </div>
        </div>

        <div class="offer__budget">
          <div class="row" style="justify-content:space-between;align-items:baseline;">
            <span class="offer__metric-l">Presupuesto</span>
            <span style="font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums;">
              <strong style="color:var(--ink-strong);">$${o.budget.used.toFixed(1)}M</strong> / $${o.budget.total.toFixed(1)}M MXN
            </span>
          </div>
          <div class="offer__budget-bar"><div class="offer__budget-fill" style="width:${budgetPct}%;background:${budgetColor};"></div></div>
        </div>

        <div class="offer__channels">${o.channels.map(c => `<span class="chip">${U.esc(c)}</span>`).join('')}</div>

        <div class="offer__foot">
          <button class="btn-sec" onclick="kykT(&quot;⏸&quot;,&quot;Campaña pausada&quot;)">Pausar</button>
          <button class="btn-cap" data-aid="${o.id}" onclick="kykOfferDetail(this.dataset.aid)">Ver detalle →</button>
        </div>
      </div>`;
  }).join('');

  // Aggregate metrics
  const totalReach = OFFERS.reduce((s,o) => {
    const m = o.reached.match(/([\d.]+)([MK])/);
    if (!m) return s;
    return s + parseFloat(m[1]) * (m[2] === 'M' ? 1 : 0.001);
  }, 0);
  const totalBudget = OFFERS.reduce((s,o) => s + o.budget.used, 0);
  const totalBudgetMax = OFFERS.reduce((s,o) => s + o.budget.total, 0);
  const avgConv = (OFFERS.reduce((s,o) => s + o.conv, 0) / OFFERS.length).toFixed(1);

  const summaryHtml = `
    <div class="grid-4">
      <div class="mini"><div class="mini__l">Campañas activas</div><div class="mini__v">${counts.activa + counts.prueba}</div></div>
      <div class="mini"><div class="mini__l">Alcance total</div><div class="mini__v">${totalReach.toFixed(1)}M</div></div>
      <div class="mini"><div class="mini__l">Conversión promedio</div><div class="mini__v">${avgConv}%</div></div>
      <div class="mini"><div class="mini__l">Presupuesto usado</div><div class="mini__v">$${totalBudget.toFixed(1)}M<span style="font-size:13px;color:var(--ink-soft);font-weight:500;"> / ${totalBudgetMax.toFixed(0)}M</span></div></div>
    </div>`;

  return `
    <section>
      <div class="sec">
        <div class="sec__title-wrap">
          <div class="sec__kicker">Campañas activas · resumen</div>
          <div class="sec__title">Performance global de campañas en curso</div>
        </div>
        <div class="sec__right">
          <span class="badge badge--ok">${counts.activa} activas</span>
          <span class="badge badge--warn">${counts.prueba} en prueba</span>
          ${counts.pausada ? `<span class="badge badge--neutral">${counts.pausada} pausada</span>` : ''}
        </div>
      </div>
      ${summaryHtml}
    </section>

    <section>
      <div class="sec">
        <div class="sec__title-wrap">
          <div class="sec__kicker">Detalle por campaña</div>
          <div class="sec__title">Ofertas en curso por arquetipo</div>
        </div>
      </div>
      <div class="grid-3">${cards}</div>
    </section>
  `;
}

    return `

  _op(head, body);
};

function startChurnTicker() {
  stopChurnTicker();
  _churnTickerStart = Date.now();
  const el = document.getElementById('churn-live-ts');
  if (!el) return;
  const tick = () => {
    const elapsed = Math.floor((Date.now() - _churnTickerStart) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(1, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    const live = document.getElementById('churn-live-ts');
    if (!live) { stopChurnTicker(); return; }
    if (elapsed >= 30) {
      // re-score event
      _churnTickerStart = Date.now();
      live.textContent = `nuevo scoring · hace 0:00 seg`;
      live.classList.add('is-pulse');
      setTimeout(() => live.classList.remove('is-pulse'), 900);
    } else {
      live.textContent = `scoring hace ${mm}:${ss} seg`;
    }
  };
  tick();
  _churnTickerHandle = setInterval(tick, 1000);
}
function stopChurnTicker() {
  if (_churnTickerHandle) clearInterval(_churnTickerHandle);
  _churnTickerHandle = null;
}

function bindNav() {
  document.querySelectorAll('.side__item').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.getAttribute('data-view');
      if (v === _currentView) return;
      _currentView = v;
      // refresh sidebar active state + topbar + content
      document.querySelectorAll('.side__item').forEach(x => x.classList.toggle('is-active', x.getAttribute('data-view') === v));
      const meta = navItemMeta(v);
      document.querySelector('.topbar').outerHTML = renderTopbar(meta);
      renderCurrentView();
      document.querySelector('.content').scrollTop = 0;
      closeChartModal();
    });
  });
}

function renderProfileInner() {
  const target = document.getElementById('profile-detail');
  if (target) target.innerHTML = window.KYKVIEWS.renderProfileDetail();
}

function bindProfileChips() {
  document.querySelectorAll('[data-profile-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-profile-id');
      window.KYKVIEWS.setSelectedProfileId(id);
      document.querySelectorAll('[data-profile-id]').forEach(x => x.classList.toggle('is-active', x.getAttribute('data-profile-id') === id));
      renderProfileInner();
    });
  });
}

window.kykNav=function(v,cb){
  if(_currentView===v){if(cb)setTimeout(cb,60);return;}
  _currentView=v;
  document.querySelectorAll('.side__item').forEach(x=>x.classList.toggle('is-active',x.getAttribute('data-view')===v));
  const meta=navItemMeta(v);const tb=document.querySelector('.topbar');
  if(tb)tb.outerHTML=renderTopbar(meta);
  renderCurrentView();
  const c=document.querySelector('.content');if(c)c.scrollTop=0;
  closeChartModal();if(cb)setTimeout(cb,80);
};
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', mount);
} else {
  mount();
}

})();

window.kykOpenCohort = function(id) {
  var cb = window.KYK.COHORT_BREAKDOWN[id];
  if (!cb) return;
  var ARC = window.KYK.ARCHETYPES;

  // Build donut SVG for cohort composition
  function cohortDonut(segs, size) {
    var r = size/2 - 4, cx = size/2, cy = size/2;
    var total = segs.reduce(function(s,g){return s+g.pct;},0);
    var acc = 0;
    var paths = segs.map(function(s) {
      var start = (acc/total)*Math.PI*2 - Math.PI/2;
      acc += s.pct;
      var end = (acc/total)*Math.PI*2 - Math.PI/2;
      var x1=cx+r*Math.cos(start), y1=cy+r*Math.sin(start);
      var x2=cx+r*Math.cos(end),   y2=cy+r*Math.sin(end);
      var large = end-start > Math.PI ? 1 : 0;
      var opacity = s.type==='nc' ? '0.4' : s.type==='pre' ? '0.65' : '1';
      return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+' 1 '+x2+','+y2+' Z" fill="'+s.color+'" stroke="#fff" stroke-width="2" opacity="'+opacity+'"/>';
    }).join('');
    return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'+paths+'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.46)+'" fill="#fff"/><text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" font-size="13" font-weight="700" fill="#3A3631">'+cb.total+'M</text><text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="10" fill="#6B6560">clientes</text></svg>';
  }

  // Segment rows
  var arcSegs = cb.segments.filter(function(s){return s.type==='arc';});
  var otherSegs = cb.segments.filter(function(s){return s.type!=='arc';});

  function segRow(s, bold) {
    var barW = Math.round(s.pct * 2.8);
    var churnColor = s.churn==='—' ? '#8B847E' : parseFloat(s.churn)>=5 ? '#9A4C18' : parseFloat(s.churn)>=3 ? '#8F6611' : '#2E6E3F';
    var typeTag = s.type==='pre'
      ? '<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:#F0EDE8;color:#6B6560;font-weight:600;letter-spacing:.5px">PREPAGO</span>'
      : s.type==='nc'
      ? '<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:#F0EDE8;color:#8B847E;font-weight:600;letter-spacing:.5px">SIN DATOS</span>'
      : '';
    var emoji = ARC[s.id] ? ARC[s.id].emoji : '';
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'
      + '<div style="width:28px;text-align:center;font-size:15px">' + emoji + '</div>'
      + '<div style="flex:1;min-width:0">'
      +   '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      +     '<span style="font-size:12px;font-weight:'+(bold?'700':'600')+';color:var(--ink)">' + s.label + '</span>'
      +     typeTag
      +   '</div>'
      +   '<div style="height:5px;background:var(--border);border-radius:3px">'
      +     '<div style="width:'+barW+'px;max-width:100%;height:100%;background:'+s.color+';border-radius:3px;opacity:'+(s.type==='nc'?'0.4':s.type==='pre'?'0.6':'1')+'"></div>'
      +   '</div>'
      + '</div>'
      + '<div style="text-align:right;min-width:80px">'
      +   '<div style="font-size:13px;font-weight:700;color:var(--ink)">' + s.pct + '% <span style="font-size:10px;font-weight:400;color:var(--ink-soft)">·</span> ' + s.count.toFixed(1) + 'M</div>'
      +   '<div style="font-size:11px;font-weight:600;color:'+churnColor+'">' + (s.churn==='—' ? '—' : 'Churn '+s.churn) + '</div>'
      + '</div>'
      + '</div>';
  }

  var arcTotal = arcSegs.reduce(function(s,g){return s+g.pct;},0);
  var otherTotal = otherSegs.reduce(function(s,g){return s+g.pct;},0);

  var head = '<div style="display:flex;align-items:center;gap:12px">'
    + '<div style="width:44px;height:44px;border-radius:10px;background:'+cb.color+'22;display:flex;align-items:center;justify-content:center;font-size:22px">📊</div>'
    + '<div>'
    +   '<div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft)">Cohorte · ' + cb.range + '</div>'
    +   '<div style="font-size:22px;font-weight:700;color:var(--ink-strong);letter-spacing:-.3px">' + cb.label + ' · ' + cb.total + 'M clientes</div>'
    + '</div></div>';

  var body = ''
    + '<div style="display:grid;grid-template-columns:160px 1fr;gap:20px;align-items:start;margin-bottom:16px">'
    +   '<div>' + cohortDonut(cb.segments, 160) + '</div>'
    +   '<div>'
    +     '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
    +       '<div style="background:var(--bg-alt);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--ink-soft);font-weight:600;letter-spacing:.5px;text-transform:uppercase">ARPU promedio</div><div style="font-size:18px;font-weight:700;color:var(--ink-strong);margin-top:2px">'+cb.arpu+'</div></div>'
    +       '<div style="background:var(--bg-alt);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--ink-soft);font-weight:600;letter-spacing:.5px;text-transform:uppercase">Churn cohorte</div><div style="font-size:18px;font-weight:700;color:var(--risk);margin-top:2px">'+cb.churn+'</div></div>'
    +     '</div>'
    +     '<div style="font-size:12px;color:var(--ink-soft);line-height:1.6;background:var(--teal-bg);border-radius:8px;padding:10px 12px;border-left:3px solid var(--teal)">💡 '+cb.note+'</div>'
    +   '</div>'
    + '</div>'

    + '<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--teal-dark);margin:16px 0 8px">Arquetipos clasificados · ' + arcTotal + '% (' + arcSegs.reduce(function(s,g){return+(s+g.count).toFixed(1);},0).toFixed(1) + 'M)</div>'
    + arcSegs.map(function(s){return segRow(s,true);}).join('')

    + '<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);margin:16px 0 8px">Fuera de arquetipo · ' + otherTotal + '%</div>'
    + otherSegs.map(function(s){return segRow(s,false);}).join('')

    + '<div style="margin-top:16px;padding:10px 12px;background:#FFF4EC;border-radius:8px;border-left:3px solid var(--orange);font-size:12px;color:var(--ink);line-height:1.6">'
    +   '<b style="color:var(--orange-deep)">Nota sobre Prepago sin arquetipo:</b> Clientes con recarga simple (planes semanales/diarios) que no generan suficiente historial de comportamiento para ser clasificados por Oracle AutoML. Su churn es el más alto — son candidatos prioritarios a migración con incentivo.'
    + '</div>'

    + '<div style="display:flex;gap:8px;margin-top:14px">'
    +   '<button class="btn-cap" style="flex:1" onclick="kykClose();kykNav(&quot;churn&quot;)">⚡ Ver Churn de este cohorte</button>'
    +   '<button class="btn-sec" onclick="kykClose()">Cerrar</button>'
    + '</div>';

  _op(head, body);
};

      +'- alerta: si churn >= 5%, 1 frase de riesgo crítico con impacto en MXN. Si churn < 5%, devuelve "" (string vacío).\n'
      +'Responde SOLO el JSON. Sin markdown, sin explicaciones.';

    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:350,
        messages:[{role:'user',content:prompt}]
      })
    });
    var data=await resp.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    // Strip any markdown fences
    text=text.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(text);

    var block=document.getElementById('kyk-ai-block');
    if(!block)return;
    block.innerHTML=_aiInsightHTML(parsed.insight,parsed.accion,parsed.alerta||'');
    // Fade in
    block.style.opacity='0';block.style.transition='opacity 0.4s';
    requestAnimationFrame(function(){block.style.opacity='1';});
  }catch(e){
    // Fallback to static data on error
    var block=document.getElementById('kyk-ai-block');
    if(block) block.innerHTML=_aiInsightHTML(d.ins,d.act,isCritical?'Churn crítico ('+churnRate+'%) — acción inmediata requerida para evitar pérdida de ingresos en este segmento.':'');
    console.warn('Kyklos AI insight error:',e);
  }
}

window.kykTogglePieRow=function(tr){
  const hint=tr.querySelector('.pie-hint');
  let next=tr.nextElementSibling;
  const anyOpen=next&&next.classList.contains('pie-plan-row')&&next.style.display!=='none';
  document.querySelectorAll('.pie-plan-row').forEach(function(r){r.style.display='none';});

window.kykHighlightPieSlice=function(aid){

  const modal=document.querySelector('.chart-modal.is-open .chart-modal__body');
  const svg=modal ? modal.querySelector('svg[id="kyk-pie-svg"]') : document.getElementById('kyk-pie-svg');
  if(!svg)return;
  const paths=svg.querySelectorAll('path[data-aid]');
  if(!aid){
    paths.forEach(function(p){
      p.style.transform='scale(1)';
      p.style.opacity='1';
      p.style.filter='';
    });
    return;
  }
  // Get center of SVG for transform-origin
  const vb=svg.getAttribute('viewBox')||'';
  const parts=vb.split(' ');
  const cx=parts[2]?parseFloat(parts[2])/2:140;
  const cy=parts[3]?parseFloat(parts[3])/2:140;

    if(p.dataset.aid===aid){
      p.style.transform='scale(1.08)';
      p.style.opacity='1';
      p.style.filter='drop-shadow(0 4px 12px rgba(0,0,0,0.32))';

      p.style.transform='scale(1)';
      p.style.opacity='0.28';
      p.style.filter='';
    }
  });
};

var _dictActiveTab = 'metricas';
var _dictOpen = false;

function kykDictOpen() {
  var modal = document.getElementById('kyk-dict');
  var ov = document.getElementById('kyk-dict-ov');
  if (!modal) return;
  modal.style.display = 'flex';
  ov.style.display = 'block';
  _dictOpen = true;
  // Build tabs
  var tabsEl = document.getElementById('kyk-dict-tabs');
  tabsEl.innerHTML = KYK_DICT.tabs.map(function(t) {
    return '<button onclick="kykDictTab(\'' + t.id + '\')" id="dict-tab-' + t.id + '" style="'
      + 'padding:12px 18px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;'
      + 'border-bottom:2px solid transparent;white-space:nowrap;color:#6B6560;transition:all 0.15s">'
      + t.label + '</button>';
  }).join('');
  kykDictTab('metricas');
  document.getElementById('kyk-dict-search').value = '';
  // Animate in
  modal.style.transform = 'translateX(100%)';
  modal.style.transition = 'transform 0.3s cubic-bezier(.32,.72,0,1)';
  requestAnimationFrame(function() { modal.style.transform = 'translateX(0)'; });
}

function kykDictClose() {
  var modal = document.getElementById('kyk-dict');
  var ov = document.getElementById('kyk-dict-ov');
  if (!modal) return;
  modal.style.transform = 'translateX(100%)';
  setTimeout(function() {
    modal.style.display = 'none';
    ov.style.display = 'none';
    _dictOpen = false;
  }, 280);
}

function kykDictTab(id) {
  _dictActiveTab = id;
  // Update tab styles
  KYK_DICT.tabs.forEach(function(t) {
    var el = document.getElementById('dict-tab-' + t.id);
    if (!el) return;
    if (t.id === id) {
      el.style.color = '#3D8B7A';
      el.style.borderBottomColor = '#3D8B7A';
      el.style.background = '#EAF4F0';
    } else {
      el.style.color = '#6B6560';
      el.style.borderBottomColor = 'transparent';
      el.style.background = 'none';
    }
  });
  kykDictRender(KYK_DICT[id] || []);
}

function kykDictRender(entries) {
  var body = document.getElementById('kyk-dict-body');
  if (!entries.length) { body.innerHTML = '<div style="color:var(--ink-faint);padding:40px;text-align:center">No hay entradas en esta categoría.</div>'; return; }
  body.innerHTML = entries.map(function(e) {
    var tagHtml = (e.tags||[]).map(function(t) {
      return '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:#E8E4DF;color:#6B6560;font-weight:600">' + t + '</span>';
    }).join(' ');
    return '<div class="dict-entry" style="background:white;border-radius:12px;border:1px solid #E8E4DF;padding:20px;margin-bottom:14px;transition:box-shadow 0.15s">'
      + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">'
      +   '<div>'
      +     '<div style="font-size:17px;font-weight:700;color:#1E1A16;margin-bottom:3px">' + e.term + '</div>'
      +     '<div style="font-size:13px;color:#6B6560;line-height:1.5">' + e.short + '</div>'
      +   '</div>'
      +   '<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;flex-shrink:0">' + tagHtml + '</div>'
      + '</div>'
      + (e.formula !== 'N/A — sistema fuente de verdad para facturación' && e.formula !== 'N/A — sistema fuente de interacciones' && e.formula !== 'N/A — datos de telemetría de red' && e.formula !== 'N/A — almacenamiento' && e.formula !== 'N/A — plataforma' && e.formula !== 'N/A — herramienta de análisis' && e.formula !== 'N/A — regulación'
        ? '<div style="background:#F4F0EB;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-family:monospace;font-size:12px;color:#3A3631;line-height:1.7;white-space:pre-wrap">' + e.formula + '</div>'
        : '')
      + '<div style="font-size:13px;color:#3A3631;line-height:1.65;margin-bottom:10px">' + e.detail + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +   '<div style="background:#EAF4F0;border-radius:6px;padding:8px 10px">'
      +     '<div style="font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#3D8B7A;margin-bottom:3px">📡 Fuente</div>'
      +     '<div style="font-size:11px;color:#3A3631;line-height:1.5">' + e.source + '</div>'
      +   '</div>'
      +   '<div style="background:#FFF4EC;border-radius:6px;padding:8px 10px">'
      +     '<div style="font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#C56833;margin-bottom:3px">⚡ Umbral / contexto</div>'
      +     '<div style="font-size:11px;color:#3A3631;line-height:1.5">' + e.threshold + '</div>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function kykDictSearch(q) {
  if (!q || q.length < 2) {
    kykDictTab(_dictActiveTab);
    return;
  }
  q = q.toLowerCase();
  // Search across ALL tabs
  var all = [].concat(KYK_DICT.metricas, KYK_DICT.arquetipos, KYK_DICT.fuentes, KYK_DICT.simulador, KYK_DICT.oracle);
  var results = all.filter(function(e) {
    return (e.term + e.short + e.detail + (e.tags||[]).join(' ')).toLowerCase().indexOf(q) !== -1;
  });
  // Deactivate all tabs visually
  KYK_DICT.tabs.forEach(function(t) {
    var el = document.getElementById('dict-tab-' + t.id);
    if (el) { el.style.color = '#6B6560'; el.style.borderBottomColor = 'transparent'; el.style.background = 'none'; }
  });
  var body = document.getElementById('kyk-dict-body');
  if (!results.length) {
    body.innerHTML = '<div style="color:var(--ink-faint);padding:40px;text-align:center">Sin resultados para "' + q + '"</div>';
    return;
  }
  body.innerHTML = '<div style="font-size:11px;color:#6B6560;margin-bottom:14px">' + results.length + ' resultado(s) en todas las categorías</div>';
  var bodyEl = document.getElementById('kyk-dict-body');
  kykDictRender(results);
}

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && _dictOpen) kykDictClose();
});
</script>

async function sbFetch(table, options = {}) {
  const params = new URLSearchParams();
  if (options.select)  params.append('select', options.select);
  if (options.filter)  Object.entries(options.filter).forEach(([k,v]) => params.append(k, v));
  if (options.order)   params.append('order', options.order);
  if (options.limit)   params.append('limit', options.limit);

  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) throw new Error(`Supabase error ${res.status} on ${table}`);
  return res.json();
}

      CHURN_BY_ARCHETYPE.forEach(r => {
        if (churnMap[r.id] !== undefined) {
          r.rate = parseFloat(churnMap[r.id].toFixed(1));
        }
      });
      console.log('[Kyklos] ✅ Churn actualizado desde Supabase:', churnMap);
    }

    // 2. ARPU por arquetipo desde arquetipo_aidp
    const arpuData = await sbFetch('arquetipo_aidp', {
      select: 'arquetipo_id,score_churn,nivel_riesgo,señal_principal_churn,canal_activacion'
    });

    if (arpuData && arpuData.length > 0) {
      // Update counter: clientes en riesgo (score > 0.72)
      const enRiesgo = arpuData.filter(r => parseFloat(r.score_churn) > 0.72).length;
      const totalClientes = 2847392; // base real
      const riesgoEscalado = Math.round((enRiesgo / 500) * totalClientes);

      window._churnCounterVal  = riesgoEscalado;

      if (counterEl) counterEl.textContent = riesgoEscalado.toLocaleString('es-MX');

      // Update CHURN_BY_ARCHETYPE signals from real data
      const signalMap = {};
      arpuData.forEach(r => {
        if (!signalMap[r.arquetipo_id]) {
          signalMap[r.arquetipo_id] = {
            signal: r.señal_principal_churn || 'Sin señal activa',
            canal:  r.canal_activacion || 'app'
          };
        }
      });
      CHURN_BY_ARCHETYPE.forEach(r => {
        if (signalMap[r.id]) r.signal = signalMap[r.id].signal;
      });
      console.log('[Kyklos] ✅ Señales y riesgo actualizados:', enRiesgo, 'clientes en riesgo');
    }

    // 3. Catalogo planes — precios reales para el simulador

      select: 'plan_id,plan_nombre,arquetipo_target,precio_mxn,churn_historico_pct,tasa_aceptacion_pct,es_mas_popular'
    });

        if (plan) {
          plan.p  = '$' + parseInt(p.precio_mxn);
          plan.ch = parseFloat(p.churn_historico_pct).toFixed(1) + '%';
          plan.ac = parseFloat(p.tasa_aceptacion_pct).toFixed(0) + '%';
          if (p.es_mas_popular === true || p.es_mas_popular === 'true' || p.es_mas_popular === 1)
            plan.pop = true;
        }
      });
      console.log('[Kyklos] ✅ Precios de planes actualizados desde Supabase');
    }

    // 4. Score historico — sparklines data (last 7 days per archetype)

      select: 'arquetipo_id,fecha,churn_rate_pct',
      order: 'fecha.desc',
      limit: '70'  // 7 arquetipos × 10 días
    });

      liveEl.title = 'Conectado a Supabase · datos en vivo';

    }

  } catch(err) {
    console.warn('[Kyklos] Supabase no disponible, usando datos locales:', err.message);
    const liveEl = document.getElementById('sb-live-dot');
    if (liveEl) {
      liveEl.style.background = '#E8854A';
      liveEl.title = 'Sin conexión a Supabase · datos locales';
    }
  }
}
